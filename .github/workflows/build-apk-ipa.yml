name: Build APK & IPA

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - android
          - ios

  push:
    tags:
      - "v*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Android APK ────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    # Run when platform is 'all', 'android', or unset (tag push)
    if: ${{ inputs.platform != 'ios' }}
    environment:
      name: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node + Bun + Install Dependencies
        uses: ./.github/actions/setup-node-bun-install

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ vars.EXPO_PUBLIC_SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env
          echo "EXPO_PUBLIC_BACKEND_URL=${{ vars.EXPO_PUBLIC_BACKEND_URL }}" >> .env

      - name: Expo Prebuild (Android)
        run: bunx expo prebuild --platform android --clean --non-interactive

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('package.json') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: coinx-android-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

  # ─── iOS IPA ────────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS IPA (unsigned)
    runs-on: macos-latest
    # Run when platform is 'all', 'ios', or unset (tag push)
    if: ${{ inputs.platform != 'android' }}
    environment:
      name: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node + Bun + Install Dependencies
        uses: ./.github/actions/setup-node-bun-install

      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ vars.EXPO_PUBLIC_SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env
          echo "EXPO_PUBLIC_BACKEND_URL=${{ vars.EXPO_PUBLIC_BACKEND_URL }}" >> .env

      - name: Expo Prebuild (iOS)
        run: bunx expo prebuild --platform ios --clean --non-interactive

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('ios/Podfile') }}
          restore-keys: ${{ runner.os }}-cocoapods-

      - name: Install CocoaPods dependencies
        run: pod install
        working-directory: ios

      - name: Build iOS archive (unsigned)
        run: |
          xcodebuild \
            -workspace ios/coinx.xcworkspace \
            -scheme coinx \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/coinx.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Package IPA
        run: |
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$RUNNER_TEMP/coinx.xcarchive/Products/Applications/coinx.app" \
            "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa"
          zip -r coinx.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: coinx-ios-${{ github.sha }}
          path: ${{ runner.temp }}/ipa/coinx.ipa
          retention-days: 30
          if-no-files-found: error
