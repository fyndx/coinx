name: Build APK & IPA

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - android
          - ios

  push:
    tags:
      - "v*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Android APK ────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    if: ${{ inputs.platform != 'ios' }}
    environment:
      name: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node + Bun + Install Dependencies
        uses: ./.github/actions/setup-node-bun-install

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ vars.EXPO_PUBLIC_SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env
          echo "EXPO_PUBLIC_BACKEND_URL=${{ vars.EXPO_PUBLIC_BACKEND_URL }}" >> .env

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('package.json') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build APK (local)
        run: eas build --local --platform android --profile preview --non-interactive --output build.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: coinx-android-${{ github.sha }}
          path: build.apk
          retention-days: 30
          if-no-files-found: error

  # ─── iOS IPA ────────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    if: ${{ inputs.platform != 'android' }}
    environment:
      name: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node + Bun + Install Dependencies
        uses: ./.github/actions/setup-node-bun-install

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ vars.EXPO_PUBLIC_SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env
          echo "EXPO_PUBLIC_BACKEND_URL=${{ vars.EXPO_PUBLIC_BACKEND_URL }}" >> .env

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('package.json') }}
          restore-keys: ${{ runner.os }}-cocoapods-

      - name: Build IPA (local)
        run: eas build --local --platform ios --profile preview --non-interactive --output build.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: coinx-ios-${{ github.sha }}
          path: build.ipa
          retention-days: 30
          if-no-files-found: error
