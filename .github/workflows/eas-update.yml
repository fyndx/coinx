name: EAS Update

on:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - "**.md"
      - ".github/workflows/compress-images.yml"
      - ".github/workflows/lint-ts.yml"
      - ".github/workflows/typecheck.yml"
      - ".github/workflows/expo-doctor.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "staging"
        type: choice
        options:
          - development
          - staging
          - production

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Setup Node + Bun + Install Dependencies
        uses: ./.github/actions/setup-node-bun-install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Determine channel
        id: channel
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "channel=development" >> $GITHUB_OUTPUT
          else
            echo "channel=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          fi

      - name: Create .env file
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "EXPO_PUBLIC_APP_ENV=development" >> .env
          else
            CHANNEL="${{ inputs.environment }}"
            if [[ "$CHANNEL" == "staging" ]]; then
              echo "EXPO_PUBLIC_APP_ENV=preview" >> .env
            elif [[ "$CHANNEL" == "production" ]]; then
              echo "EXPO_PUBLIC_APP_ENV=production" >> .env
            else
              echo "EXPO_PUBLIC_APP_ENV=development" >> .env
            fi
          fi

      - name: Append EAS Variables to .env
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ vars.EXPO_PUBLIC_SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env
          echo "EXPO_PUBLIC_BACKEND_URL=${{ vars.EXPO_PUBLIC_BACKEND_URL }}" >> .env

      - name: Verify .env
        run: cat .env

      - name: Generate message with latest commit message not sha
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            MESSAGE="PR: ${{ github.event.head_commit.message }}"
          else
            MESSAGE="Manual Update to ${{ inputs.environment }} - ${{ github.event.head_commit.message }}"
          fi
          echo "MESSAGE=$MESSAGE" >> $GITHUB_ENV

      - name: Publish update
        run: eas update --branch ${{ steps.channel.outputs.channel }} --message "$MESSAGE" --non-interactive
