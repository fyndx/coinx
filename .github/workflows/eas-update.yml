name: EAS Update

on:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - "**.md"
      - ".github/workflows/compress-images.yml"
      - ".github/workflows/lint-ts.yml"
      - ".github/workflows/typecheck.yml"
      - ".github/workflows/expo-doctor.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "development"
        type: choice
        options:
          - development
          - staging
          - production

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'pull_request' && 'staging' || inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Setup Node + Bun + Install Dependencies
        uses: ./.github/actions/setup-node-bun-install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Determine channel
        id: channel
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "channel=staging" >> $GITHUB_OUTPUT
          else
            echo "channel=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          fi

      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ vars.EXPO_PUBLIC_SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env
          echo "EXPO_PUBLIC_BACKEND_URL=${{ vars.EXPO_PUBLIC_BACKEND_URL }}" >> .env

      - name: Publish update
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            MESSAGE="PR: ${{ github.event.pull_request.title }} (#${{ github.event.pull_request.number }})"
          else
            MESSAGE="Manual Update to ${{ inputs.environment }}"
          fi
          eas update --branch ${{ steps.channel.outputs.channel }} --message "$MESSAGE" --non-interactive
