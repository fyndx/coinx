name: EAS Update

on:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - "**.md"
      - ".github/workflows/compress-images.yml"
      - ".github/workflows/lint-ts.yml"
      - ".github/workflows/typecheck.yml"
      - ".github/workflows/expo-doctor.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "preview"
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'pull_request' && 'development' || inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Setup Node + Bun + Install Dependencies
        uses: ./.github/actions/setup-node-bun-install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "name=development" >> $GITHUB_OUTPUT
          else
            echo "name=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          fi

      - name: Set environment variables
        run: |
          ENV_NAME="${{ steps.env.outputs.name }}"
          echo "EXPO_PUBLIC_APP_ENV=$ENV_NAME" >> .env
          echo "EXPO_PUBLIC_APP_ENV=$ENV_NAME" >> $GITHUB_ENV
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ vars.EXPO_PUBLIC_SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ vars.EXPO_PUBLIC_SUPABASE_URL }}" >> $GITHUB_ENV
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> $GITHUB_ENV
          echo "EXPO_PUBLIC_BACKEND_URL=${{ vars.EXPO_PUBLIC_BACKEND_URL }}" >> .env
          echo "EXPO_PUBLIC_BACKEND_URL=${{ vars.EXPO_PUBLIC_BACKEND_URL }}" >> $GITHUB_ENV
      - name: Generate update message
        run: |
          ENV_NAME="${{ steps.env.outputs.name }}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            MESSAGE="PR #${{ github.event.pull_request.number }}: $(git log -1 --pretty=%s)"
          else
            MESSAGE="Deploy to $ENV_NAME: $(git log -1 --pretty=%s)"
          fi
          echo "MESSAGE=$MESSAGE" >> $GITHUB_ENV

      - name: Publish update
        run: |
          ENV_NAME="${{ steps.env.outputs.name }}"
          eas update --branch $ENV_NAME --environment $ENV_NAME --message "$MESSAGE" --non-interactive
